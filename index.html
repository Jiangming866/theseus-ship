* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', serif;
  width: 100vw; height: 100vh;
  overflow: hidden;
  background: #000;
  user-select: none;
  -webkit-user-select: none;
  display: flex; align-items: center; justify-content: center;
}

/* 游戏主画布 - 固定 16:9 */
#game {
  width: 100%; height: 100%;
  max-width: calc(100vh * 16 / 9);
  max-height: calc(100vw * 9 / 16);
  position: relative;
  overflow: hidden;
  container-type: size;
}

/* 背景层 */
#bg-layer {
  position: absolute; inset: 0;
  transition: opacity 1.5s ease;
  z-index: 0;
}
#bg-layer.dark  { background: radial-gradient(ellipse at center, #1a1410 0%, #0a0806 70%, #000 100%); }
#bg-layer.campfire { background: radial-gradient(ellipse at 50% 70%, #4a2010 0%, #1a0a04 30%, #0a0604 60%, #000 90%); }
#bg-layer.morning { background: radial-gradient(ellipse at 50% 100%, #3a4030 0%, #1a2018 40%, #0a0c08 70%, #000 95%); }
#bg-layer.cabin  { background: radial-gradient(ellipse at 50% 80%, #2a2018 0%, #140e08 40%, #060402 80%, #000 100%); }
#bg-layer.forest { background: radial-gradient(ellipse at 50% 50%, #0c1410 0%, #060a08 50%, #000 90%); }
#bg-layer.cave   { background: radial-gradient(ellipse at 50% 20%, #100c14 0%, #060410 50%, #000 90%); }
#bg-layer.nightmare { background: radial-gradient(ellipse at 50% 50%, #1a0410 0%, #0a0208 40%, #000 80%); }
#bg-layer.ending { background: #000; transition: opacity 3s ease; }

/* 场景图占位 - 全屏背景 */
#scene-img {
  position: absolute; inset: 0;
  z-index: 2; pointer-events: none;
  background-size: cover; background-position: center;
  background-repeat: no-repeat;
  transition: opacity 1s ease;
}

/* 角色立绘层 */
#char-layer {
  position: absolute; bottom: -5%; left: -8%;
  width: 60%; height: 105%;
  z-index: 3; pointer-events: none;
  background-size: contain; background-repeat: no-repeat;
  background-position: left bottom;
  transition: opacity 0.8s ease;
}
#char-layer.hidden { opacity: 0; }

/* 主角（木木）立绘 - 右侧位置 */
#char-layer.char-right {
  left: auto; right: 0;
  width: 55%; height: 72%;
  background-position: right bottom;
}

/* 老人立绘 - 左侧偏右，稍小 */
#char-layer.char-oldman {
  left: -2%;
  width: 57%; height: 102%;
}

/* 爸爸立绘 - 偏右一点，避免立绘一半被切掉 */
#char-layer.char-father {
  left: -11%; bottom: -7%;
  width: 80%; height: 100%;
  background-size: auto 100%;
}

/* 妈妈立绘 */
#char-layer.char-mother {
  left: -8%; bottom: -5%;
  width: 58%; height: 105%;
}

/* 老人女儿立绘（木木变的）- 右侧，半身立绘 */
#char-layer.char-daughter {
  left: auto; right: 0;
  width: 65%; height: 85%;
  background-position: right bottom;
  background-image: url('images/char_daughter.webp');
}

/* 兔子立绘 - 缩小上移 */
#char-layer.char-rabbit {
  width: 30%; height: 55%;
  bottom: 15%; left: 5%;
}

/* 暗色渐变遮罩 (底部) */
#vignette {
  position: absolute; inset: 0; z-index: 5; pointer-events: none;
  background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 40%, transparent 70%),
              radial-gradient(ellipse at 50% 0%, transparent 60%, rgba(0,0,0,0.3) 100%);
}

/* 章节标题 */
#chapter-label {
  position: absolute; top: 6cqh; left: 50%; transform: translateX(-50%);
  z-index: 20; pointer-events: none;
  font-size: clamp(12px, 1.4cqw, 15px);
  letter-spacing: 0.3em;
  color: rgba(180,160,140,0.6);
  text-transform: uppercase;
  transition: opacity 0.5s ease;
}

/* 中央提示 */
#center-hint {
  position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%);
  z-index: 20; pointer-events: none;
  text-align: center;
  transition: opacity 0.8s ease;
}
#center-hint .line {
  font-size: clamp(14px, 1.8cqw, 20px);
  color: rgba(200,190,170,0.8);
  letter-spacing: 0.2em;
  margin: 6px 0;
}

/* 对话区域 */
#dialogue-box {
  position: absolute; bottom: 0; left: 0; right: 0;
  z-index: 10;
  padding: 3cqh 8cqw 5cqh 4cqw;
  background: linear-gradient(to top, rgba(0,0,0,0.92) 60%, rgba(0,0,0,0.7) 85%, transparent 100%);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
#dialogue-box.hidden { opacity: 0; transform: translateY(10px); pointer-events: none; }

/* 说话人 - 对话框上方 */
#speaker-name {
  font-family: 'HuiWenMingChao', serif;
  font-size: clamp(13px, 1.5cqw, 16px);
  font-weight: 400;
  letter-spacing: 0.2em;
  color: #c8a882;
  padding: 4px 14px;
  background: rgba(200,180,150,0.12);
  border-left: 3px solid #c8a882;
  display: inline-block;
  margin-bottom: 8px;
  transition: color 0.3s ease, opacity 0.3s ease;
}
#speaker-name.narrator { color: rgba(180,160,140,0.7); font-weight: 400; }
#speaker-name.no-speaker {
  opacity: 0; height: 0; margin: 0; padding: 0;
  background: none; border-left: none; pointer-events: none;
}
#speaker-name.mumu { color: #f0c0a0; }
#speaker-name.oldman { color: #b8c8c0; }
#speaker-name.rabbit { color: #f8e8d0; }
#speaker-name.mother { color: #d0a0c0; }
#speaker-name.father { color: #a0a8c0; }

/* 对话文本 */
#dialogue-text {
  font-size: clamp(15px, 1.8cqw, 19px);
  line-height: 1.9;
  color: rgba(220,210,195,0.92);
  min-height: 3.8em;
  letter-spacing: 0.04em;
}
#dialogue-text .hint-part { color: rgba(180,160,140,0.60); }

/* 闪烁光标 */
#cursor-blink {
  display: inline-block;
  width: 2px; height: 1em;
  background: rgba(200,170,130,0.6);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 0.7s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* 继续提示 */
#continue-hint {
  position: absolute; bottom: 2.5cqh; left: 50%; transform: translateX(-50%);
  z-index: 11;
  font-size: 12px; letter-spacing: 0.2em;
  color: rgba(160,140,120,0.5);
  animation: pulse 2s ease-in-out infinite;
  pointer-events: none;
}
#continue-hint.hidden { display: none; }
@keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.7; } }

/* 选项区域 */
#choices-area {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 15;
  display: flex; flex-direction: column;
  gap: 16px;
  align-items: center;
  transition: opacity 0.3s ease;
}
#choices-area.hidden { opacity: 0; pointer-events: none; }

.choice-btn {
  background: rgba(30,25,20,0.85);
  border: 1px solid rgba(180,150,120,0.3);
  color: rgba(220,200,180,0.9);
  font-family: inherit;
  font-size: clamp(14px, 1.6cqw, 17px);
  padding: 14px 40px;
  min-width: 260px;
  max-width: 80cqw;
  cursor: pointer;
  letter-spacing: 0.08em;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.choice-btn:hover {
  background: rgba(50,40,30,0.9);
  border-color: rgba(200,170,130,0.6);
  color: #f0e0d0;
  transform: translateY(-1px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
.choice-btn:active { transform: scale(0.98); }

/* 结束画面 */
#ending-screen {
  position: absolute; inset: 0; z-index: 30;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, #1a1018 0%, #000 100%);
  opacity: 0; pointer-events: none;
  transition: opacity 2s ease;
  overflow-y: auto;
  padding: 3vh 0;
}
#ending-screen.show { opacity: 1; pointer-events: auto; }

#ending-image {
  flex-shrink: 0;
  width: 78vw;
  max-width: 900px;
  min-height: 45vh;
  max-height: 65vh;
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center center;
  background-color: rgba(0,0,0,0.4);
  margin-bottom: 1.2rem;
  opacity: 0;
  transition: opacity 2s ease;
  box-shadow: 0 4px 32px rgba(0,0,0,0.6);
}
#ending-image.show { opacity: 1; }

#ending-title {
  font-family: 'HuiWenMingChao', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', serif;
  font-size: clamp(24px, 3cqw, 36px);
  letter-spacing: 0.2em;
  margin-bottom: 0.5rem;
  text-align: center;
}
#ending-subtitle {
  font-size: clamp(14px, 1.6cqw, 18px);
  color: rgba(200,180,160,0.7);
  letter-spacing: 0.1em;
  margin-bottom: 1.5rem;
  max-width: 70vw; text-align: center;
  line-height: 1.8;

#save-panel.show { opacity: 1; pointer-events: auto; }

/* 存档面板容器80%透明 */
#save-panel.show::before {
  opacity: 0.8;
}

/* 左卡片从上方弹入 */
#save-panel.show .save-slot:nth-child(1) {
  animation: popInFromTop 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.05s both;
}
/* 右卡片从下方弹入 */
#save-panel.show .save-slot:nth-child(3) {
  animation: popInFromBottom 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both;
}
/* 中间淡入 */
#save-panel.show .save-slot:nth-child(2) {
  animation: fadeInUp 0.5s ease 0.25s both;
}
/* 底部按钮滑入 */
#save-panel.show .panel-btns {
  animation: slideUp 0.45s ease 0.4s both;
}
#save-panel h2 {
  font-family: 'HuiWenMingChao', serif;
  font-size: clamp(20px,2.4cqw,26px); font-weight: 400;
  color: #444; letter-spacing: 0.3em; margin-bottom: 4cqh;
}
.save-slots { display: flex; gap: 28px; flex-wrap: wrap; justify-content: center; }

  width: 260px;
  border: none; border-radius: 8px;
  padding: 22px 18px 18px; text-align: center;
  color: rgba(60,50,40,0.7); transition: all 0.25s ease;
  display: flex; flex-direction: column; align-items: center; justify-content: center;

#gallery-title {
  position: absolute;
  /* 相对底图：底图占 88%宽/82%高，居中 → 顶距 = (100-82)/2 = 9% + 底图内的 8% */
  top: 16%;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'HuiWenMingChao', serif;
  font-size: clamp(22px, 2.6cqw, 32px);
  font-weight: 500;

  text-shadow: none;
  z-index: 1;
  margin: 0;
  white-space: nowrap;

/* 5个结局卡片 - 图片背景 */
.gallery-slot {
  position: absolute;
  width: 14cqw; max-width: 200px; aspect-ratio: 1/1.5;
  background: center/100% 100% no-repeat;
  border: none;
  border-radius: 20px;
  overflow: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  box-sizing: border-box;
  box-shadow: none;
  opacity: 0;
  transition: all 0.3s ease;
  cursor: pointer;
}
.gallery-slot:hover { transform: translateY(-4px) !important; filter: brightness(1.05); }

/* 入场动效 */
@keyframes slideDownIn {
  from { opacity: 0; transform: translateY(-80px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes slideUpIn {
  from { opacity: 0; transform: translateY(80px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadePopIn {
  from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
  to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

/* 动效触发 */
#gallery-overlay.show #gallery-slot1 { animation: slideDownIn 0.5s ease-out forwards; }
#gallery-overlay.show #gallery-slot2 { animation: slideDownIn 0.5s ease-out forwards; }
#gallery-overlay.show #gallery-slot3 { animation: slideUpIn 0.5s ease-out forwards; }
#gallery-overlay.show #gallery-slot4 { animation: slideUpIn 0.5s ease-out forwards; }
#gallery-overlay.show #gallery-slot5 { animation: fadePopIn 0.45s ease-out 0.25s forwards; }
.gallery-slot .slot-label {
  font-family: 'HuiWenMingChao', serif;
  font-size: clamp(13px, 1.3cqw, 16px);
  font-weight: 500;
  letter-spacing: 0.15em;
  text-align: center;
  color: #1a1e26;
}
.gallery-slot .slot-status {
  margin-top: 8px;
  font-family: 'HuiWenMingChao', serif;
  font-size: clamp(10px, 0.9cqw, 12px);
  color: rgba(80,70,60,0.5);
  letter-spacing: 0.08em;
  text-align: center;
}
.gallery-slot.locked { opacity: 0.55; cursor: default; }
.gallery-slot.locked .slot-status { color: rgba(100,100,100,0.5); }
.gallery-slot.unlocked { cursor: pointer; }

/* 已解锁且有CG的卡片：叠加对应CG图作半透明展示 */
.gallery-slot.unlocked.has-cg::after {
  content: '';
  position: absolute; inset: 0;
  background-image: var(--cg-url);
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  opacity: 0.7;
  pointer-events: none;
  z-index: 0;
  border-radius: inherit;
  filter: blur(3px);
  transition: filter 0.3s ease;
}
.gallery-slot.unlocked.has-cg:hover::after {
  filter: blur(1px);
  opacity: 0.85;
}
.gallery-slot.unlocked > * { position: relative; z-index: 1; }

/* 真相卡片CG单独调整（slot2 = 右上角） */
#gallery-slot2.unlocked.has-cg::after {
  background-size: cover;
  background-position: center center;
  transform: scale(1.35);
  transform-origin: 25% center;
}

/* 返回按钮 - 复刻图片框样式 */
#gallery-back {
  position: absolute;
  bottom: 20%;
  left: 50%;
  transform: translateX(-50%);
  background: #f0f2f8;
  border: 1.5px solid #4a6fa5;
  border-radius: 8px;
  padding: 10px 36px;
  font-family: 'HuiWenMingChao', serif;
  font-size: clamp(13px, 1.3cqw, 16px);
  color: #2a3a5a;
  letter-spacing: 0.2em;
  cursor: pointer;
  z-index: 3;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  transition: all 0.25s ease;
}
#gallery-back:hover {
  background: #e8ecf4;
  border-color: #5a7fb5;
  transform: translateX(-50%) translateY(-2px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* 结局CG查看弹窗 */
#cg-viewer {
  position: fixed; inset: 0; z-index: 60;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.85);
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s ease;
}
#cg-viewer.show { opacity: 1; pointer-events: auto; }
#cg-frame {
  position: relative;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  width: 88vh; max-width: 78vw;
  max-height: 94vh;
}
#cg-image {
  width: 100%;
  max-height: 70vh;
  object-fit: contain;

// ============================================
// 忒修斯之船 - 叙事游戏引擎

const $ = (s) => document.querySelector(s);

// ============================================
// 音效系统
// ============================================

const SOUNDS = {
  crash:     'audio/crash.mp3',
  rain:      'music/sfx/rain.mp3',
  campfire:  'music/sfx/campfire.mp3',
  monster:   'music/sfx/monster.mp3',
  monsterS:  'music/sfx/monsterS.mp3',
  sadBgm:    'music/sfx/sadBgm.mp3',
  birds:     'music/sfx/birds.mp3',
  grow:      'music/sfx/grow.mp3',
  hit:       'music/sfx/hit.mp3',
  flesh:     'music/sfx/flesh.mp3',
  quirky:    'music/sfx/quirky.mp3',
  sadFail:   'music/sfx/sadFail.mp3',
  gentleSad: 'music/sfx/gentleSad.mp3',
  tinnitus:  'music/sfx/tinnitus.mp3',
  heartbeat:  'music/sfx/heartbeat.mp3',
  arrow:     'music/sfx/arrow.mp3',
  lowFlat:   'music/sfx/lowFlat.mp3',
  footsteps: 'music/sfx/footsteps.mp3',
  musicbox:      'music/sfx/musicbox.mp3',
  musicbox_full:  'music/sfx/musicbox_full.mp3',
};

const _audioCache = {};
const _fadeTimers = {};  // 跟踪渐入/渐出定时器，防止互相打架
const _audioReady = {};  // 跟踪音频是否已缓冲完毕

// 预创建所有音频对象（静音状态，避免自动播放限制）
function _ensureAudio(key) {
  if (!_audioCache[key]) {
    let src = SOUNDS[key];
    // 如果有内嵌 base64 版本，优先使用（零网络请求）
    if (typeof _INLINE !== 'undefined' && _INLINE[src]) src = _INLINE[src];
    const a = new Audio(src);
    a.preload = 'auto';  // 内嵌数据立即可用；网络文件按需加载
    _audioCache[key] = a;
    _audioReady[key] = false;
    // 监听就绪
    a.addEventListener('canplaythrough', () => { _audioReady[key] = true; }, { once: true });
    a.addEventListener('error', () => { console.warn('[Audio] 加载失败:', key, SOUNDS[key]); });
    // 部分浏览器 canplaythrough 可能不触发，加一个 loadeddata 兜底
    a.addEventListener('loadeddata', () => { if (!_audioReady[key]) _audioReady[key] = true; }, { once: true });
  }
  return _audioCache[key];
}

// 等待音频就绪（超时10秒兜底）
function _waitForAudio(key) {
  return new Promise((resolve) => {
    const a = _ensureAudio(key);
    if (_audioReady[key]) return resolve();
    if (a.readyState >= 3) { _audioReady[key] = true; return resolve(); } // HAVE_FUTURE_DATA 及以上
    // preload='none' 时浏览器不会主动加载，需要手动触发一次
    try { a.load(); } catch (e) {}
    let resolved = false;
    const onReady = () => { if (!resolved) { resolved = true; _audioReady[key] = true; resolve(); } };
    a.addEventListener('canplaythrough', onReady, { once: true });
    a.addEventListener('loadeddata', onReady, { once: true });
    setTimeout(() => { if (!resolved) { resolved = true; console.warn('[Audio] 等待超时:', key); resolve(); } }, 10000);
  });
}

function playSound(key, volume) {
  const src = SOUNDS[key];
  if (!src) return;
  const a = _ensureAudio(key);
  a.loop = false;
  a.volume = ((volume !== undefined) ? volume : 0.4) * settings.sfxVolume;
  a.currentTime = 0;
  _waitForAudio(key).then(() => {
    const doPlay = (retries) => {
      a.play().catch((err) => {
        if (retries > 0) {
          setTimeout(() => doPlay(retries - 1), 300);
        } else {
          console.warn('[Audio] playSound 最终失败:', key, err.name);
        }
      });
    };
    doPlay(1);
  });
}

// 循环背景音（渐入，等音频就绪后再播放）
function playLoop(key, volume, fadeDuration) {
  console.log('playLoop called:', key, volume);
  const src = SOUNDS[key];
  if (!src) return;
  const a = _ensureAudio(key);
  a.loop = true;
  // 如果已在播放且音量接近目标，不重置（避免场景切换时断续）
  const targetVol = ((volume !== undefined) ? volume : 0.1) * settings.musicVolume;
  a._baseVolume = (volume !== undefined) ? volume : 0.1;
  if (!a.paused && Math.abs(a.volume - targetVol) < 0.05) return;

  a.volume = 0;
  a.currentTime = 0;

  // 等待音频缓冲就绪后再播放
  _waitForAudio(key).then(() => {
    const doPlay = (retries) => {
      a.play().then(() => {
        if (_fadeTimers[key]) { clearInterval(_fadeTimers[key]); }
        const target = ((volume !== undefined) ? volume : 0.1) * settings.musicVolume;
        const fd = (fadeDuration !== undefined) ? fadeDuration : 1250;
        const steps = fd / 50;
        const inc = target / steps;
        let v = 0;
        const fade = setInterval(() => {
          v = Math.min(v + inc, target);
          a.volume = v;
          if (v >= target) { clearInterval(fade); _fadeTimers[key] = null; }
        }, 50);
        _fadeTimers[key] = fade;
      }).catch((err) => {
        if (retries > 0) {
          console.warn('[Audio] play 失败，重试中… (' + key + ') 剩余重试:', retries, err.name);
          setTimeout(() => doPlay(retries - 1), 500);
        } else {
          console.warn('[Audio] play 最终失败:', key, err.name);
        }
      });
    };
    doPlay(2); // 就绪后最多重试2次
  });
}

// 停止循环背景音（渐出）
function stopLoop(key) {
  const a = _audioCache[key];
  if (!a) return;
  if (_fadeTimers[key]) { clearInterval(_fadeTimers[key]); }
  const fade = setInterval(() => {
    a.volume = Math.max(a.volume - 0.03, 0);
    if (a.volume <= 0) { a.pause(); clearInterval(fade); _fadeTimers[key] = null; }
  }, 50);
  _fadeTimers[key] = fade;
}

// 快速点击标题 Logo 3次 → 重置所有数据（结局 + 存档）
let _resetClicks = 0;
let _resetTimer = null;

function _onResetClick(target) {
  _resetClicks++;
  console.log('[Reset] click #' + _resetClicks, 'target:', target.tagName, target.id);
  if (_resetClicks >= 3) {
    _resetClicks = 0;
    if (_resetTimer) clearTimeout(_resetTimer);
    localStorage.removeItem('theseus_endings');
    localStorage.removeItem('theseus_ship_saves');
    console.log('[Reset] 数据已清除，即将刷新…');
    // 视觉反馈
    if (target.style) target.style.filter = 'brightness(2)';
    setTimeout(() => { if (target.style) target.style.filter = ''; }, 300);
    setTimeout(() => { location.reload(); }, 500);
    return;
  }
  if (_resetTimer) clearTimeout(_resetTimer);
  _resetTimer = setTimeout(() => { _resetClicks = 0; }, 800);
}

window.addEventListener('DOMContentLoaded', () => {
  const titleLogo = document.getElementById('title-logo');
  if (titleLogo) {
    titleLogo.addEventListener('click', (e) => { e.stopPropagation(); _onResetClick(e.currentTarget); });
    titleLogo.title = '快速点击3次可重置所有数据';
    console.log('[Reset] 监听器已绑定到 #title-logo');
  } else {

  }
  // 备用：也监听标题右侧区域，防止 Logo 点击被拦截
  const titleRight = document.getElementById('title-right');
  if (titleRight) {
    titleRight.addEventListener('click', (e) => {
      if (e.target.id === 'title-logo' || e.target.closest('#title-logo')) {

        return;

});

// 状态

let isTyping = false;
let skipTypewriter = false;

let dialogueLog = [];

// 设置
const SETTINGS_KEY = 'theseus_ship_settings';
let settings = (function(){
  try{return JSON.parse(localStorage.getItem('theseus_ship_settings'))||{};}catch(e){return{};}
})();
if (settings.typewriterSpeed == null) settings.typewriterSpeed = 40;
if (settings.musicVolume == null) settings.musicVolume = 0.6;
if (settings.sfxVolume == null) settings.sfxVolume = 0.6;
if (settings.fullscreen == null) settings.fullscreen = false;
function saveSettingsToDisk() {
  try{localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));}catch(e){}
}

// ============================================
// 存档/读档
// ============================================

const SAVE_KEY = 'theseus_ship_saves';

function getSaves() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)) || [null,null,null]; }
  catch(e) { return [null,null,null]; }
}

function setSaves(saves) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(saves)); } catch(e) {}
}

function saveGame(slotIndex) {
  const saves = getSaves();
  const scene = currentScene;
  if (!scene || !currentSceneId) return;

  const stepIdx = typewriterIndex;
  const chapter = scene.chapter || (scene.steps[0] && scene.steps[0].text ? scene.steps[0].text.substring(0,20)+'...' : '');

  saves[slotIndex] = {
    sceneId: currentSceneId,
    stepIndex: stepIdx,
    chapter: chapter,
    endings: endingsCollected.slice(),
    time: new Date().toLocaleString('zh-CN', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})
  };
  setSaves(saves);
  refreshSavePanel();
}

function loadGame(slotIndex) {
  const saves = getSaves();
  const save = saves[slotIndex];
  if (!save) return;
  // 合并存档中的结局到当前记录
  if (save.endings) {
    save.endings.forEach(id => {
      if (!endingsCollected.includes(id)) endingsCollected.push(id);
    });
    try { localStorage.setItem('theseus_endings', JSON.stringify(endingsCollected)); } catch(e) {}
  }
  closeSavePanel();
  // 如果游戏未启动（从标题页读取），先进入游戏
  if (gameContainer.style.display === 'none') {
    stopLoop('musicbox'); stopLoop('musicbox_full'); // 停止标题页音乐
    // 不再预创建所有音频对象（之前会触发 preload='auto' 下载 53MB 音乐）
    // 现在改为按需：playSound/playLoop 时 _ensureAudio 自动创建
    enterGame();
  }
  loadScene(save.sceneId);
}

function deleteSave(slotIndex) {
  const saves = getSaves();
  saves[slotIndex] = null;
  setSaves(saves);
  refreshSavePanel();
}

function openSavePanel() {
  refreshSavePanel();
  savePanel.classList.add('show');
}

function closeSavePanel(e) {
  if (e) e.stopPropagation();
  savePanel.classList.remove('show');
}

// 返回标题页
function returnToTitle() {
  savePanel.classList.remove('show');
  // 停止所有循环音
  Object.keys(SOUNDS).forEach(k => {
    const a = _audioCache[k];
    if (a && !a.paused) { a.pause(); a.currentTime = 0; }
  });
  // 隐藏游戏容器，显示标题页
  gameContainer.style.display = 'none';
  titleScreen.style.display = 'flex';
  titleScreen.classList.remove('fade');
  saveMenuBtn.classList.add('hidden');
  memoryBtn.classList.add('hidden');
  settingsBtn.classList.add('hidden');
  // 标题页音乐
  playTitleMusic();
}

function refreshSavePanel() {
  const saves = getSaves();
  saveSlots.innerHTML = [0,1,2].map(i => {
    const s = saves[i];
    if (!s) return `<div class="save-slot empty">
      <div class="slot-num">存档 ${i+1}</div>
      <div class="slot-info">空</div>
      <div class="slot-actions"><button class="slot-btn" onclick="saveGame(${i})">保存</button></div>
    </div>`;
    const ch = s.chapter.length > 9 ? s.chapter.slice(0, 9) + '…' : s.chapter;
    return `<div class="save-slot">
      <div class="slot-num">存档 ${i+1}</div>
      <div class="slot-info"><span class="cname">${escapeHtml(ch)}</span><br>${s.time}</div>
      <div class="slot-actions">
        <button class="slot-btn" onclick="saveGame(${i})">覆盖</button>
        <button class="slot-btn" onclick="loadGame(${i})">读取</button>
        <button class="slot-btn del-btn" onclick="deleteSave(${i})">删除</button>
      </div>
    </div>`;
  }).join('');

  const collected = endingsCollected.length;
  endingProgress.textContent = `已发现结局：${collected} / 5`;
}

function applyHintStyle(step) {
  if (!step || !step.hint) return;
  const txt = step.text;
  const hintIdx = txt.lastIndexOf('（此处建议存档）');
  if (hintIdx === -1) return;
  dialogueText.innerHTML =
    escapeHtml(txt.substring(0, hintIdx)) +
    '<span class="hint-part">' + escapeHtml('（此处建议存档）') + '</span>';
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// 记忆系统

function logDialogue(step) {
  if (!step) return;
  const sp = step.speaker || '旁白';
  dialogueLog.push({ speaker: sp, text: step.text });
}

function openMemory() {
  const list = $('#memory-list');
  if (dialogueLog.length === 0) {
    list.innerHTML = '<div style="color:rgba(160,140,120,0.5);text-align:center;padding:40px 0;font-size:14px;">还没有对话记录</div>';
  } else {
    list.innerHTML = dialogueLog.map(e =>
      '<div class="memory-entry"><div class="memory-speaker">' + escapeHtml(e.speaker) + '</div><div class="memory-text">' + escapeHtml(e.text) + '</div></div>'
    ).join('');
    list.scrollTop = list.scrollHeight;
  }
  const panel = $('#memory-panel');
  panel.classList.add('show');
  panel.addEventListener('click', function(e) { if (e.target === panel) closeMemory(); });
}

function closeMemory(e) {
  if (e) e.stopPropagation();
  $('#memory-panel').classList.remove('show');
}

// 按场景懒加载：只预加载当前+后续2个场景的图片（而非一次性20+张）
function preloadForScene(sceneId) {
  const idx = SCENE_ORDER.indexOf(sceneId);
  if (idx === -1) return;

  // 预取当前场景及之后2个场景的资源
  const toPreload = new Set();
  for (let i = idx; i < Math.min(idx + 3, SCENE_ORDER.length); i++) {
    const sid = SCENE_ORDER[i];
    if (SCENE_ASSETS[sid]) {
      SCENE_ASSETS[sid].forEach(url => toPreload.add(url));
    }
  }

  toPreload.forEach(src => {
    if (_preloadCache.has(src)) return;  // 已加载过则跳过
    const img = new Image();
    img.onload = img.onerror = () => _preloadCache.add(src);
    // 优先使用内嵌的 base64 数据（零请求）
    if (typeof _INLINE !== 'undefined' && _INLINE[src]) {
      img.src = _INLINE[src];
    } else {
      img.src = src;
    }
  });
}

function preloadBackground() {
  // 不再一次性全量加载！改为首屏只预加载序幕(s0)+第一章(s1)的资源
  console.log('[Preload] 改为按场景懒加载模式');
  preloadForScene('s0');
}

function preloadAudio() {

}

function finishLoading() {
  const screen = document.getElementById('loading-screen');
  const text = document.getElementById('loading-text');
  text.textContent = '准备就绪';
  screen.classList.add('done');
  setTimeout(() => {
    if (screen.parentNode) screen.style.display = 'none';
    // 标题页出现后立即后台加载其余资源
    preloadBackground();
  }, 600);
}

// ============================================
// 标题页按钮
// ============================================

function enterGame() {
  titleScreen.classList.add('fade');
  setTimeout(() => {
    titleScreen.style.display = 'none';
    gameContainer.style.display = 'block';
  }, 800);
}

function startFromTitle() {
  closeSavePanel();
  stopLoop('musicbox'); stopLoop('musicbox_full'); // 停止标题页音乐
  // 不再预创建所有音频对象（preload='none'，按需加载）
  _ensureAudio('crash');
  setTimeout(() => {
    const c = _audioCache['crash'];
    if (c) { c.loop = false; c.volume = 0.4 * settings.sfxVolume; c.currentTime = 0; c.play().catch(() => {}); }
  }, 1200);
  enterGame();
  saveMenuBtn.classList.remove('hidden');
  settingsBtn.classList.remove('hidden');
  loadScene('s0');
}

function continueFromTitle() {
  const saves = getSaves();
  const hasSave = saves.some(s => s !== null && s !== undefined);
  if (!hasSave) {
    alert('没有找到存档记录，将开始新游戏。');
    startFromTitle();
    return;
  }
  // 显示存档面板供玩家选择读取
  openSavePanel();
}

function showEndingGallery() {
  const gallery = $('#gallery-overlay');
  const collected = endingsCollected;

  // 5个结局的 ID 对应关系
  const endings = [
    { id: 'bad1', slot: 'gallery-slot1', name: '轻信' },
    { id: 'true', slot: 'gallery-slot2', name: '真相' },
    { id: 'end3', slot: 'gallery-slot3', name: '谎言' },
    { id: 'oe',   slot: 'gallery-slot4', name: '离开' },
    { id: 'bad2', slot: 'gallery-slot5', name: '虚假幸福' },
  ];

  endings.forEach(e => {
    const el = $(`#${e.slot}`);
    const statusEl = el.querySelector('.slot-status');
    const unlocked = collected.includes(e.id);

    if (unlocked) {
      el.classList.remove('locked');
      el.classList.add('unlocked');
      statusEl.textContent = '已解锁';
      // 注入对应CG作为半透明背景（CG未出图时为null，不显示）
      const cgUrl = ENDING_CG[e.id];
      if (cgUrl) {
        el.style.setProperty('--cg-url', `url('${cgUrl}')`);
        el.classList.add('has-cg');
      } else {
        el.style.removeProperty('--cg-url');
        el.classList.remove('has-cg');
      }
    } else {
      el.classList.remove('unlocked');
      el.classList.add('locked');
      statusEl.textContent = '未解锁';
      el.style.removeProperty('--cg-url');
    }
  });

  gallery.classList.add('show');
}

// 结局卡片点击：已解锁→打开CG查看；未解锁→无反应
function onGallerySlotClick(endingId) {
  if (!endingsCollected.includes(endingId)) return;
  openCG(endingId);
}

function openCG(endingId) {
  const viewer = $('#cg-viewer');
  const img = $('#cg-image');
  const title = $('#cg-title');
  const sub = $('#cg-subtitle');
  const info = ENDING_INFO[endingId];
  if (!info) return;
  img.src = ENDING_CG[endingId] || '';
  img.alt = info.title;
  title.textContent = info.title;
  sub.textContent = info.sub;
  viewer.classList.add('show');
}

function closeCG() {
  $('#cg-viewer').classList.remove('show');
}

function closeGallery() {
  $('#gallery-overlay').classList.remove('show');
}

// ============================================
// 设置面板
// ============================================

function openSettings() {
  $('#set-speed').value = settings.typewriterSpeed;
  $('#set-speed-val').textContent = settings.typewriterSpeed + 'ms';
  $('#set-volume').value = Math.round(settings.musicVolume * 100);
  $('#set-volume-val').textContent = Math.round(settings.musicVolume * 100) + '%';
  $('#set-sfx').value = Math.round(settings.sfxVolume * 100);
  $('#set-sfx-val').textContent = Math.round(settings.sfxVolume * 100) + '%';
  updateFullscreenUI();
  $('#settings-overlay').classList.add('show');
}

function closeSettings() {
  $('#settings-overlay').classList.remove('show');
}

function applySettings(e) {
  if (e) e.stopPropagation();
  settings.typewriterSpeed = parseInt($('#set-speed').value) || 40;
  settings.musicVolume = (parseInt($('#set-volume').value) || 100) / 100;
  settings.sfxVolume = (parseInt($('#set-sfx').value) || 100) / 100;
  saveSettingsToDisk();
  Object.keys(_audioCache).forEach(k => {
    const a = _audioCache[k];
    if (a && !a.paused) {
      a.volume = (a._baseVolume || 0.5) * settings.musicVolume;
    }
  });
  closeSettings();
}

function previewVolume(val) {
  const vol = parseInt(val) / 100;
  Object.keys(_audioCache).forEach(k => {
    const a = _audioCache[k];
    if (a && !a.paused) {
      a.volume = (a._baseVolume || 0.5) * vol;
    }
  });
}

function toggleFullscreen() {
  settings.fullscreen = !settings.fullscreen;
  saveSettingsToDisk();
  if (settings.fullscreen) {
    try { document.documentElement.requestFullscreen().catch(() => {}); } catch(e) {}
  } else {
    try { document.exitFullscreen().catch(() => {}); } catch(e) {}
  }
  updateFullscreenUI();
}

function updateFullscreenUI() {
  const wBtn = document.getElementById('set-window');
  const fBtn = document.getElementById('set-full');
  if (!wBtn || !fBtn) return;
  if (settings.fullscreen) {
    wBtn.classList.remove('active'); fBtn.classList.add('active');
  } else {
    wBtn.classList.add('active'); fBtn.classList.remove('active');
  }
}

// ============================================
// 游戏引擎
// ============================================

function startGame() {
  stopLoop('musicbox'); stopLoop('musicbox_full'); // 停止标题页音乐
  // 不再预创建所有音频对象（preload='none'，按需加载）
  // _ensureAudio 会在 playSound/playLoop 首次调用时自动创建并触发 load()

  titleScreen.classList.add('fade');
  setTimeout(() => {
    titleScreen.style.display = 'none';
    gameContainer.style.display = 'block';
    saveMenuBtn.classList.remove('hidden');
    settingsBtn.classList.remove('hidden');
    // 注意：endingsCollected 不在此清空——它是跨会话的图鉴记录（已通过 L1049 从 localStorage 读取）
    // 每次新游戏只是"开始新一次游戏"，图鉴已解锁的结局应保留
    // 车祸音效：在用户手势内延迟播放（配合第一句台词出现时机）
    _ensureAudio('crash');
    setTimeout(() => {
      const c = _audioCache['crash'];
      if (c) { c.loop = false; c.volume = 0.85; c.currentTime = 0; c.play().catch(() => {}); }
    }, 1200);
    loadScene('s0');
  }, 800);
}

function restartGame() {
  endingScreen.classList.remove('show');
  saveMenuBtn.classList.remove('hidden');
  settingsBtn.classList.remove('hidden');
  // 重新开始前停掉所有可能残留的结局BGM
  stopLoop('quirky');
  stopLoop('sadFail');
  stopLoop('gentleSad');
  stopLoop('sadBgm');
  loadScene('s0');
}

function loadScene(sceneId) {
  const scene = SCENES[sceneId];
  if (!scene) return;

  // 全局清理：停止常规循环音效（quirky 由独立逻辑管理，不在此清理）
  ['rain','campfire','monster','sadBgm','birds'].forEach(k => stopLoop(k));

  // 场景切换音效管理
  if (sceneId === 's0') {
    playLoop('rain', 0.15);   // 序幕暴雨
  }
  if (sceneId === 's1') {
    stopLoop('rain');      // 离开序幕停雨声
    playLoop('campfire', 0.55);  // 进入营火章节播火堆声
  }
  if (sceneId !== 's1' && currentSceneId === 's1') {
    stopLoop('campfire');   // 离开营火章节停火堆声（如进入 s2 天亮）
    stopLoop('monster');    // 离开营火章节停怪物嘶吼
  }
  if (sceneId === 's2') {
    playLoop('sadBgm', 0.5);   // 天亮低落宁静
    playLoop('birds', 0.25);    // 鸟声
  }
  if (sceneId !== 's2' && currentSceneId === 's2') {
    stopLoop('sadBgm');     // 离开天亮章节停低落宁静音乐（如进入分支）
    stopLoop('birds');      // 停鸟声
  }
  // 欢快怪异音乐：回头路线(s4) + 兔子线(s_bad1) + 山洞路线(s6→s8)
  if (sceneId === 's4' || sceneId === 's_bad1' || sceneId === 's6' || sceneId === 's7' || sceneId === 's8') {
    playLoop('quirky', 0.5);
  }
  // 温和悲伤：进入小屋场景(s5)时开始播放
  if (sceneId === 's5') {
    playLoop('gentleSad', 0.3, 4500);
  }
  if (sceneId !== 's5' && currentSceneId === 's5') {
    stopLoop('gentleSad');  // 离开小屋（出木屋前）停温和悲伤
  }
  // s5b 林中的路：沿用天亮背景音（sadBgm + birds）
  if (sceneId === 's5b') {
    playLoop('sadBgm', 0.5);
    playLoop('birds', 0.25);
  }
  if ((sceneId !== 's5b') && currentSceneId === 's5b') {
    stopLoop('sadBgm');
    stopLoop('birds');
  }
  // s10 逃离及后续所有场景（s_oe/s11/s_end3/s_end4）：播放低平音效
  if (sceneId === 's10' || sceneId === 's_oe' || sceneId === 's11' || sceneId === 's_end3' || sceneId === 's_end4') {
    playLoop('lowFlat', 0.5);
  }
  // s_bad2 虚假的幸福结局：播放欢快怪异
  if (sceneId === 's_bad2') {
    playLoop('quirky', 0.5);
  }
  // 离开 s10 及后续场景时停止低平音效
  if ((sceneId !== 's10' && sceneId !== 's_oe' && sceneId !== 's11' && sceneId !== 's_end3' && sceneId !== 's_end4') &&
      (currentSceneId === 's10' || currentSceneId === 's_oe' || currentSceneId === 's11' || currentSceneId === 's_end3' || currentSceneId === 's_end4')) {
    stopLoop('lowFlat');
  }
  // 停止条件：quirky 覆盖回头(s4→s5) + 兔子线(s_bad1) + 虚假幸福(s_bad2) + 山洞路线(s6→s8)
  if ((sceneId === 's5' && currentSceneId === 's4') ||
      (sceneId !== 's_bad1' && currentSceneId === 's_bad1') ||
      (sceneId !== 's_bad2' && currentSceneId === 's_bad2') ||
      ((sceneId !== 's6' && sceneId !== 's7' && sceneId !== 's8' && sceneId !== 's_bad2') &&
       (currentSceneId === 's6' || currentSceneId === 's7' || currentSceneId === 's8'))) {
    stopLoop('quirky');
  }
  // 心跳：离开山洞真相段(s7/s8)时停止
  if ((sceneId !== 's7' && sceneId !== 's8') &&
      (currentSceneId === 's7' || currentSceneId === 's8')) {
    stopLoop('heartbeat');
  }

  clearTypewriter();
  currentScene = scene;
  currentSceneId = sceneId;
  skipTypewriter = false;
  typewriterIndex = 0;

  // 显示存档按钮
  saveMenuBtn.classList.remove('hidden');
  memoryBtn.classList.remove('hidden');
  settingsBtn.classList.remove('hidden');

  // 隐藏 UI
  hideChoices();
  continueHint.classList.add('hidden');

  // 背景
  bgLayer.className = scene.bg || 'dark';

  // 场景图
  if (scene.sceneImg && SCENE_IMAGES[scene.sceneImg]) {
    sceneImg.style.backgroundImage = `url(${SCENE_IMAGES[scene.sceneImg]})`;
    sceneImg.style.opacity = '0.6';
  } else {
    sceneImg.style.opacity = '0';
  }

  // 角色立绘 - 默认隐藏，由对话步骤控制
  charLayer.classList.add('hidden');
  charLayer.style.backgroundImage = '';

  // 章节标签
  if (scene.chapter) {
    chapterLabel.textContent = scene.chapter;
    chapterLabel.style.opacity = '1';
  } else {
    chapterLabel.style.opacity = '0';
  }

  // 中央提示
  if (centerHint) centerHint.style.opacity = '0';

  // 显示对话
  dialogueBox.classList.remove('hidden');
  showStep(0);

  // 按需预加载后续场景图片（懒加载核心）
  preloadForScene(sceneId);
}

function showStep(index) {
  const scene = currentScene;
  if (!scene || index >= scene.steps.length) {
    // 所有步骤完成
    finishScene();
    return;
  }

  const step = scene.steps[index];
  typewriterIndex = index;

  // hint 标记 —— 待打字完成后由 applyHintStyle 处理
  dialogueText._hintStep = !!step.hint;

  // 说话人
  const nameEl = speakerName;
  nameEl.textContent = step.speaker || '';
  nameEl.className = step.class || '';

  // 没有说话人时隐藏角色名框
  if (!step.speaker) {
    nameEl.classList.add('no-speaker');
  } else {
    nameEl.classList.remove('no-speaker');
  }

  // 第一人称视角：旁白统一为"我"
  if (step.class === 'narrator') {
    nameEl.textContent = '';
    nameEl.classList.add('no-speaker');
  }

  // 角色立绘 - 有角色说话时显示对应立绘，旁白时隐藏
  // 支持step级立绘切换：通过 step.char 覆盖默认立绘
  if (step.class && step.class !== 'narrator' && CHAR_IMAGES[step.class]) {
    const charKey = step.char || step.class;
    charLayer.style.backgroundImage = `url(${CHAR_IMAGES[charKey]})`;
    charLayer.classList.remove('hidden');
    if (step.class === 'mumu') {
      charLayer.classList.add('char-right');
      charLayer.classList.remove('char-oldman', 'char-rabbit', 'char-father', 'char-mother', 'char-daughter');
    } else if (step.class === 'oldman') {
      charLayer.classList.add('char-oldman');
      charLayer.classList.remove('char-right', 'char-rabbit', 'char-father', 'char-mother', 'char-daughter');
    } else if (step.class === 'rabbit') {
      charLayer.classList.add('char-rabbit');
      charLayer.classList.remove('char-right', 'char-oldman', 'char-father', 'char-mother', 'char-daughter');
    } else if (step.class === 'father') {
      charLayer.classList.add('char-father');
      charLayer.classList.remove('char-right', 'char-oldman', 'char-rabbit', 'char-mother', 'char-daughter');
    } else if (step.class === 'mother') {
      charLayer.classList.add('char-mother');
      charLayer.classList.remove('char-right', 'char-oldman', 'char-rabbit', 'char-father', 'char-daughter');
    } else if (step.class === 'daughter') {
      // 老人女儿（木木变的） - 右侧，背景图由CSS .char-daughter控制
      charLayer.classList.add('char-daughter');
      charLayer.classList.remove('char-right', 'char-oldman', 'char-rabbit', 'char-father', 'char-mother');
    } else {
      charLayer.classList.remove('char-right', 'char-oldman', 'char-rabbit', 'char-father', 'char-mother', 'char-daughter');
    }
  } else if (!step.effect) {
    // 有特效（如兔子变身）时不清空立绘
    charLayer.classList.add('hidden');
  }

  // 特效触发（兔子变身动效已删除）

  // step 级场景图切换（如 s5 进屋后外景→内景）
  if (step.img && SCENE_IMAGES[step.img]) {
    sceneImg.style.backgroundImage = `url(${SCENE_IMAGES[step.img]})`;
    sceneImg.style.opacity = '0.6';
  }

  // 音效触发（支持同时播放多个）
  if (step.sound) {
    if (step.soundLoop) {
      playLoop(step.sound, step.soundVolume, step.soundFadeIn);
    } else {
      playSound(step.sound, step.soundVolume);
    }
  }
  if (step.sound2) {
    if (step.soundLoop2) {
      playLoop(step.sound2, step.sound2Volume, step.sound2FadeIn);
    } else {
      playSound(step.sound2, step.sound2Volume);
    }
  }


  // 打字机效果
  isTyping = true;
  dialogueText.innerHTML = '';
  typeText(step.text, 0);
}

function typeText(text, charIndex) {
  if (skipTypewriter) {
    dialogueText.textContent = text;
    isTyping = false;
    applyHintStyle(currentScene.steps[typewriterIndex]);
    continueHint.classList.remove('hidden');
    return;
  }

  if (charIndex >= text.length) {
    isTyping = false;
    applyHintStyle(currentScene.steps[typewriterIndex]);
    continueHint.classList.remove('hidden');
    return;
  }

  dialogueText.textContent = text.substring(0, charIndex + 1) + '|';

  const punctuation = '，。！？；：…—';
  const isPunctuation = punctuation.includes(text[charIndex]);
  const base = settings.typewriterSpeed;
  const delay = isPunctuation ? Math.round(base * 3.75) : base;
  typewriterTimer = setTimeout(() => typeText(text, charIndex + 1), delay);
}

function clearTypewriter() {
  if (typewriterTimer) {
    clearTimeout(typewriterTimer);
    typewriterTimer = null;
  }
  isTyping = false;
}

function advanceDialogue() {
  if (!currentScene) return;

  if (isTyping) {
    // 正在打字 → 跳过打字，立即显示全文
    skipTypewriter = true;
    clearTypewriter();
    const step = currentScene.steps[typewriterIndex];
    dialogueText.textContent = step.text;
    isTyping = false;
    continueHint.classList.remove('hidden');
    logDialogue(step);
    return;
  }

  // 下一步
  if (typewriterIndex < currentScene.steps.length) {
    logDialogue(currentScene.steps[typewriterIndex]);
  }
  const nextIndex = typewriterIndex + 1;
  if (nextIndex < currentScene.steps.length) {
    showStep(nextIndex);
  } else {
    finishScene();
  }
}

function finishScene() {
  const scene = currentScene;

  // 有结局 → 显示结束画面
  if (scene.ending) {
    showEnding(scene.ending);
    return;
  }

  // 有选项 → 显示选项
  if (scene.choices) {
    showChoices(scene.choices);
    return;
  }

  // 自动推进到下一场景
  if (scene.next) {
    clearTypewriter();
    dialogueBox.classList.add('hidden');
    continueHint.classList.add('hidden');
    setTimeout(() => loadScene(scene.next), 500);
  }
}

function showChoices(choices) {
  continueHint.classList.add('hidden');
  choicesArea.innerHTML = '';
  choicesArea.classList.remove('hidden');

  choices.forEach((choice) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = choice.text;
    btn.addEventListener('click', () => {
      hideChoices();
      dialogueBox.classList.add('hidden');
      continueHint.classList.add('hidden');
      setTimeout(() => loadScene(choice.next), 400);
    });
    choicesArea.appendChild(btn);
  });
}

function hideChoices() {
  choicesArea.classList.add('hidden');
  choicesArea.innerHTML = '';
}

function showEnding(ending) {
  dialogueBox.classList.add('hidden');
  continueHint.classList.add('hidden');
  hideChoices();
  saveMenuBtn.classList.add('hidden');
  memoryBtn.classList.add('hidden');
  settingsBtn.classList.add('hidden');
  bgLayer.className = 'ending';
  sceneImg.style.opacity = '0';
  chapterLabel.style.opacity = '0';
  charLayer.classList.add('hidden');

  const alreadyCollected = endingsCollected.includes(ending.id);
  if (!alreadyCollected) { endingsCollected.push(ending.id); try{localStorage.setItem('theseus_endings',JSON.stringify(endingsCollected))}catch(e){} }

  endingTitle.textContent = ending.title;
  endingTitle.style.color = ending.color || '#c8a882';
  endingSubtitle.textContent = ending.subtitle;

  // 结局CG插图（所有有CG的结局都显示）
  const endingImage = $('#ending-image');
  const cgUrl = ENDING_CG[ending.id];
  if (cgUrl) {
    endingImage.style.backgroundImage = `url(${cgUrl})`;
    endingImage.classList.remove('hidden');
    setTimeout(() => endingImage.classList.add('show'), 200);
  } else {
    endingImage.classList.remove('show');
    endingImage.classList.add('hidden');
  }

  endingScreen.classList.add('show');

  // 显示已收集结局
  const total = 5;
  const collected = endingsCollected.length;
  if (ending.id === 'true') {
    endingSubtitle.textContent = ending.subtitle + `\n\n（已发现结局：${collected}/${total}）`;
  }
}

// ============================================
// 事件处理
// ============================================

document.addEventListener('click', (e) => {
  if (titleScreen.style.display !== 'none') return;
  if (endingScreen.classList.contains('show')) return;
  if (!choicesArea.classList.contains('hidden')) return;
  if (savePanel.classList.contains('show')) return;
  if (e.target.closest('#save-menu-btn')) return;
  if (document.querySelector('#memory-panel').classList.contains('show')) return;
  if (e.target.closest('#memory-btn')) return;
  if (document.querySelector('#settings-overlay').classList.contains('show')) return;
  if (e.target.closest('#settings-btn')) return;

  advanceDialogue();
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    // 存档面板/结局图鉴/结局界面/选项/记忆面板打开时不响应空格
    if (savePanel.classList.contains('show')) return;
    if (document.querySelector('#gallery-overlay').classList.contains('show')) return;
    if (endingScreen.classList.contains('show')) return;
    if (!choicesArea.classList.contains('hidden')) return;
    if (document.querySelector('#memory-panel').classList.contains('show')) return;
    if (document.querySelector('#settings-overlay').classList.contains('show')) return;
    if (!currentScene) {
      startGame();
      return;
    }
    advanceDialogue();
  }
});

// 标题页音乐：根据结局收集状态切换
function playTitleMusic() {
  const allCollected = endingsCollected.length === 5;
  const key = allCollected ? 'musicbox_full' : 'musicbox';
  const alt  = allCollected ? 'musicbox' : 'musicbox_full';
  stopLoop(alt);
  playLoop(key, 0.35, 1500);
}

// 音频解锁：用户首次交互后播放标题音乐
let _audioUnlocked = false;
function _unlockAudio() {
  if (_audioUnlocked) return;
  _audioUnlocked = true;
  // 只有还在标题页时才播放标题音乐（避免用户直接点"开始游戏"时音乐误播）
  if (!currentScene) {
    playTitleMusic();
    console.log('[Audio] 用户已交互，开始播放标题音乐');
  }
}
// 在标题页上监听首次交互
document.addEventListener('click', _unlockAudio, { once: true });
document.addEventListener('keydown', _unlockAudio, { once: true });
document.addEventListener('touchstart', _unlockAudio, { once: true });

// 初始化
console.log('忒修斯之船 · 已就绪');
console.log('分支数: 8 | 结局数: 5 | 场景数: ' + Object.keys(SCENES).length);
console.log('[Audio] 等待用户首次交互以解锁音频...');

// Service Worker 注册
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      console.log('[SW] 已注册，作用域：', reg.scope);
    }).catch(err => {
      console.warn('[SW] 注册失败：', err);
    });
  });
}
