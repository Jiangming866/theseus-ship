<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>忒修斯之船</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      color: #e0e0e0;
      font-family: 'Microsoft YaHei', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .container {
      text-align: center;
      width: 90%;
      max-width: 460px;
    }
    .title {
      font-size: 22px;
      letter-spacing: 8px;
      margin-bottom: 48px;
      color: #7a8aa5;
      font-weight: 300;
    }
    .progress-wrapper {
      width: 100%;
      height: 3px;
      background: #1a1a2e;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4a6fa5, #6b9fd9);
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    .percent {
      font-size: 13px;
      color: #6b9fd9;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .current-file {
      font-size: 11px;
      color: #3a3a4a;
      margin-bottom: 4px;
      word-break: break-all;
      min-height: 16px;
    }
    .size-info {
      font-size: 12px;
      color: #4a4a5a;
    }
    .status-text {
      font-size: 13px;
      color: #7a8aa5;
      margin-top: 20px;
      min-height: 20px;
      letter-spacing: 1px;
    }
    .skip-btn {
      display: inline-block;
      margin-top: 28px;
      padding: 8px 24px;
      background: transparent;
      border: 1px solid #2a2a3e;
      border-radius: 4px;
      color: #4a5a6a;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.2s;
      font-family: inherit;
    }
    .skip-btn:hover {
      border-color: #4a6fa5;
      color: #6b9fd9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">忒修斯之船</div>
    <div class="progress-wrapper">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="percent" id="percent">0%</div>
    <div class="current-file" id="current-file">正在获取资源信息...</div>
    <div class="size-info" id="size-info"></div>
    <div class="status-text" id="status-text"></div>
    <button class="skip-btn" id="skip-btn">跳过预加载，直接进入</button>
  </div>
  <script src="preloader.js"></script>
</body>
</html>
